version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: kousuu_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
      MYSQL_DATABASE: kousuu_kanri
      MYSQL_USER: kousuu
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-kousuu_pass}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root_pass}"]
      interval: 5s
      timeout: 10s
      retries: 20

  backend:
    build: ./backend
    container_name: kousuu_backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: kousuu
      DB_PASSWORD: ${MYSQL_PASSWORD:-kousuu_pass}
      DB_NAME: kousuu_kanri
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: kousuu_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
